###############################################################################
# Ryu SDN Controller Configuration
#
# Configuration file for the Ryu controller used in the SDN-based DDoS
# detection system. Loaded via: ryu-manager --config-file ryu.conf
#
# Project: SDN with ML for DDoS Detection
###############################################################################

[DEFAULT]

# ---------------------------------------------------------------------------
# OpenFlow Protocol Settings
# ---------------------------------------------------------------------------

# IP address to listen for OpenFlow switch connections.
# Bound to localhost only. In production, bind to the
# dedicated management interface IP instead of 0.0.0.0.
# For remote Mininet setups, change this to the management interface IP.
ofp_listen_host = 127.0.0.1

# TCP port for OpenFlow switch connections.
# Port 6653 is the IANA-assigned standard for OpenFlow.
# Switches in network_topology/topology.py connect to this port.
ofp_tcp_listen_port = 6653

# ---------------------------------------------------------------------------
# REST API / Web Service Settings
# ---------------------------------------------------------------------------

# IP address for the Ryu WSGI web service API.
# Bound to localhost to prevent exposure on untrusted interfaces.
# Use a reverse proxy (nginx) if external access is needed.
wsapi_host = 127.0.0.1

# Port for the Ryu WSGI web service API.
# Provides REST endpoints for querying switch and flow information.
wsapi_port = 8080

# ---------------------------------------------------------------------------
# Logging Settings
# ---------------------------------------------------------------------------

# Directory for controller log files (relative to working directory).
# Logs are shared with other components via the logs/ directory.
log_dir = ../logs

# Controller log filename within log_dir.
# Contains OpenFlow events, ML detection results, and error messages.
# Written by mitigation_module.py logger calls.
log_file = controller_log.txt

# ---------------------------------------------------------------------------
# DDoS Detection Settings
# ---------------------------------------------------------------------------

# Flow statistics polling interval in seconds.
# Lower values improve detection speed but increase controller load.
# Recommended range: 2-10 seconds.
stats_poll_interval = 5

# ML prediction confidence threshold (0.0 to 1.0).
# Only flows with attack probability above this value trigger DROP rules.
# Higher values reduce false positives but may miss weaker attacks.
confidence_threshold = 0.7

# DROP rule hard timeout in seconds.
# Blocked flows are automatically unblocked after this duration (±20% random).
# Set higher for persistent attacks, lower for faster recovery.
block_rule_timeout = 300

# Maximum PacketIn events processed per switch per second.
# Prevents a single switch from overwhelming the controller.
# Excess events are silently dropped.
packet_in_rate_limit = 100

# Port security: maximum MAC addresses allowed per port per switch.
# New MACs beyond this limit are rejected with a warning.
max_macs_per_port = 5

# ---------------------------------------------------------------------------
# TLS Settings (audit 1.4)
# ---------------------------------------------------------------------------
# Uncomment the following lines to enable TLS on the OpenFlow channel.
# Generate certificates first: sudo bash scripts/setup_tls.sh
#
# ctl_privkey = config/tls/controller-privkey.pem
# ctl_cert = config/tls/controller-cert.pem
# ca_certs = config/tls/ca-cert.pem

# ---------------------------------------------------------------------------
# REST API Authentication (audit 3.1)
# ---------------------------------------------------------------------------
# Set SDN_API_TOKEN environment variable to enable bearer token auth.
# If not set, relies on 127.0.0.1 binding (wsapi_host above).
