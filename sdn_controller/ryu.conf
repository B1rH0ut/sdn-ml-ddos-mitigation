###############################################################################
# Ryu SDN Controller Configuration
#
# Configuration file for the Ryu controller used in the SDN-based DDoS
# detection system. Loaded via: ryu-manager --config-file ryu.conf
#
# Project: SDN with ML for DDoS Detection
###############################################################################

[DEFAULT]

# ---------------------------------------------------------------------------
# OpenFlow Protocol Settings
# ---------------------------------------------------------------------------

# IP address to listen for OpenFlow switch connections.
# 0.0.0.0 accepts connections from any interface (required for Mininet).
ofp_listen_host = 0.0.0.0

# TCP port for OpenFlow switch connections.
# Port 6653 is the IANA-assigned standard for OpenFlow.
# Switches in network_topology/topology.py connect to this port.
ofp_tcp_listen_port = 6653

# ---------------------------------------------------------------------------
# REST API / Web Service Settings
# ---------------------------------------------------------------------------

# IP address for the Ryu WSGI web service API.
# 0.0.0.0 allows access from any interface for monitoring.
wsapi_host = 0.0.0.0

# Port for the Ryu WSGI web service API.
# Provides REST endpoints for querying switch and flow information.
wsapi_port = 8080

# ---------------------------------------------------------------------------
# Logging Settings
# ---------------------------------------------------------------------------

# Directory for controller log files (relative to working directory).
# Logs are shared with other components via the logs/ directory.
log_dir = ../logs

# Controller log filename within log_dir.
# Contains OpenFlow events, ML detection results, and error messages.
# Written by mitigation_module.py logger calls.
log_file = controller_log.txt
